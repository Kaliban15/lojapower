<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manual do Rastreador | Power Tech</title>
  <link rel="stylesheet" href="/manual-rastreador.css" />
</head>
<body>
  <main class="manual-page">
    <section class="hero-card" aria-labelledby="pageTitle">
      <p class="eyebrow">Power Tech</p>
      <h1 id="pageTitle">Manual do Rastreador</h1>
      <p class="subtitle">Escolha o seu celular e assista ao passo a passo.</p>

      <div class="actions" aria-label="Escolha o manual em v&iacute;deo">
        <button
          class="manual-button android"
          type="button"
          data-video-src="/assets/manual-rastreador/manual-android.mp4"
          data-video-title="V&iacute;deo manual para Android"
        >
          <span class="icon-box">
            <img src="/assets/manual-rastreador/android-logo.png" alt="" />
          </span>
          <span>
            <strong>V&iacute;deo manual para Android</strong>
            <small>Toque para assistir agora</small>
          </span>
        </button>

        <button
          class="manual-button iphone"
          type="button"
          data-video-src="/assets/manual-rastreador/manual-iphone.mp4"
          data-video-title="V&iacute;deo manual para iPhone"
        >
          <span class="icon-box">
            <img src="/assets/manual-rastreador/apple-logo.png" alt="" />
          </span>
          <span>
            <strong>V&iacute;deo manual para iPhone</strong>
            <small>Toque para assistir agora</small>
          </span>
        </button>
      </div>

      <a
        class="whatsapp-button"
        href="https://api.whatsapp.com/send?phone=5511948609350&text=Ol%C3%A1%2C%20preciso%20de%20ajuda%20para%20configurar%20meu%20rastreador"
        target="_blank"
        rel="noopener noreferrer"
      >
        Pedir ajuda no WhatsApp
      </a>
    </section>
  </main>

  <div class="video-overlay" id="videoOverlay" hidden>
    <div class="video-topbar">
      <strong id="videoTitle">V&iacute;deo manual</strong>
      <button type="button" id="closeVideoBtn" aria-label="Fechar v&iacute;deo">Fechar</button>
    </div>
    <video id="manualVideo" controls playsinline preload="metadata"></video>
  </div>

  <script src="/manual-rastreador.js" defer></script>
</body>
</html>
