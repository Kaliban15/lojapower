<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Power Produtos | Rastreio do envio</title>
  <meta name="description" content="Acompanhe o rastreio do envio criado no Melhor Envio." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --blue-900: #081b4a;
      --blue-700: #0f4df3;
      --blue-100: #eef4ff;
      --white: #ffffff;
      --gray-900: #212a3d;
      --gray-700: #5a657c;
      --gray-200: #e3e9f5;
      --green: #12a558;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Manrope", "Segoe UI", sans-serif;
      color: var(--gray-900);
      background:
        radial-gradient(circle at top, rgba(47, 109, 255, 0.12), transparent 28%),
        linear-gradient(180deg, #f8fbff 0%, #f2f6ff 45%, #ffffff 100%);
      display: grid;
      place-items: center;
      padding: 1rem 1rem 1.3rem;
    }

    .card {
      width: min(640px, 100%);
      background: var(--white);
      border: 1px solid var(--gray-200);
      border-radius: 1.2rem;
      padding: 1.2rem;
      box-shadow: 0 18px 32px rgba(12, 24, 50, 0.12);
    }

    .status-tag {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.35rem 0.7rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 800;
      margin-bottom: 0.65rem;
      background: #e6f8ee;
      color: var(--green);
    }

    .hero {
      display: grid;
      gap: 0.3rem;
    }

    h1 {
      margin: 0;
      font-size: clamp(1.5rem, 4vw, 2rem);
      line-height: 1.2;
    }

    p {
      margin: 0.55rem 0 0;
      color: var(--gray-700);
      font-size: 0.96rem;
      line-height: 1.45;
    }

    .summary {
      margin-top: 1rem;
      display: grid;
      gap: 0.7rem;
      grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    }

    .summary[hidden] {
      display: none;
    }

    .summary-card {
      border: 1px solid var(--gray-200);
      border-radius: 0.95rem;
      padding: 0.85rem;
      background: var(--blue-100);
      min-height: 96px;
    }

    .summary-label {
      margin: 0;
      font-size: 0.72rem;
      font-weight: 800;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--gray-700);
    }

    .summary-value {
      margin: 0.22rem 0 0;
      font-size: 1rem;
      font-weight: 800;
      line-height: 1.35;
      color: var(--blue-900);
      word-break: break-word;
    }

    .helper-note {
      margin-top: 0.95rem;
      padding: 0.9rem 1rem;
      border-radius: 0.95rem;
      background: #f8fbff;
      border: 1px solid var(--gray-200);
      font-size: 0.9rem;
    }

    .actions {
      margin-top: 1rem;
      display: grid;
      gap: 0.65rem;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .btn {
      border: 0;
      border-radius: 0.9rem;
      min-height: 3rem;
      padding: 0.78rem 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      text-decoration: none;
      font-size: 0.94rem;
      font-weight: 800;
      cursor: pointer;
    }

    .btn-primary {
      color: var(--white);
      background: linear-gradient(120deg, var(--blue-700), #2f6dff);
    }

    .btn-secondary {
      color: var(--blue-900);
      border: 1px solid #bccfff;
      background: var(--white);
    }

    @media (max-width: 540px) {
      .actions { grid-template-columns: 1fr; }
      .card { padding: 1rem; }
    }
  </style>
  <link rel="stylesheet" href="whatsapp-float.css" />
  <script defer src="tracking.js"></script>
  <script defer src="whatsapp-float.js"></script>
</head>
<body>
  <main class="card">
    <section class="hero">
      <div class="status-tag" id="trackingBadge">Pedido confirmado</div>
      <h1 id="trackingTitle">Seu pedido foi confirmado.</h1>
      <p id="trackingText">Estamos acompanhando seu envio e deixando tudo organizado para voce acompanhar com tranquilidade.</p>
    </section>
    <section class="summary" id="trackingSummary" hidden></section>
    <p class="helper-note" id="trackingHelper">Sempre que houver uma nova atualizacao, ela aparecera automaticamente nesta tela e em Minhas Compras.</p>
    <div class="actions">
      <a href="index.html" class="btn btn-secondary">Voltar para Home</a>
      <a href="my-orders.html" class="btn btn-primary">Acessar minhas compras</a>
    </div>
  </main>
</body>
</html>
